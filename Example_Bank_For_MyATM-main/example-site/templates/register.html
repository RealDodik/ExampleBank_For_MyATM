<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); width: 320px; }
        h2 { margin: 0 0 20px; }
        input { width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #1a4fa0; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0a2a5e; }
        .error { color: #c0392b; font-size: .85rem; margin-bottom: 12px; }
        .note { background: #fffbf0; border: 1px solid #c9a84c; border-radius: 4px; padding: 10px; font-size: .82rem; color: #7a6020; margin-bottom: 16px; }
        a { color: #1a4fa0; }
        .footer { text-align: center; margin-top: 16px; font-size: .85rem; }
    </style>
</head>
<body>
<div class="card">
    <h2>Register</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <div class="note">After registering, do first deposit via admin panel to activate your account.</div>
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
        <label>Password</label>
        <input type="password" name="password" required>
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>
        <button type="submit">Register</button>
    </form>
    <div class="footer">Already have an account? <a href="/login">Login</a></div>
</div>
</body>
</html>
